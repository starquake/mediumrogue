# tygo generates client/src/protocol.gen.ts from internal/protocol — the
# protocol-drift defense. Run via `make protocol`; CI fails if the generated
# file is stale (`make protocol-check`). Never edit the output by hand.
packages:
  - path: "github.com/starquake/mediumrogue/internal/protocol"
    output_path: "./client/src/protocol.gen.ts"
    frontmatter: |
      // Code generated by tygo from server/internal/protocol. DO NOT EDIT.
      // Regenerate with `make protocol`.
