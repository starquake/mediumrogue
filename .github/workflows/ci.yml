name: CI

on:
  push:
    branches: [main]
    # Release tags promote the already-built main image; they do not
    # re-run the suite or rebuild (see the promote job).
    tags: ['v*.*.*']
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  # Docs-only detection (#125): on PULL REQUESTS whose whole diff is
  # documentation (markdown, docs/, issue templates, .claude/ AI tooling),
  # the heavy jobs below skip — none of them could fail because of such a
  # diff, and each docs push was burning ~8 minutes of e2e (and its flakes,
  # #117). Deliberately scoped to pull_request events ONLY: push-event runs
  # (main) always run everything, because deploy.yml consumes push-event CI
  # runs and must never see a green run whose docker-build was skipped.
  # lint stays unconditional as the cheap "CI is alive" signal.
  changes:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      # paths-filter lists the PR's changed files via the API; the
      # workflow-level permissions block (contents: read) would strip this.
      pull-requests: read
    outputs:
      # 'true' only when this is a PR and EVERY changed file is
      # documentation. On push events the filter step is skipped, its
      # output is empty, and the || makes this 'false' — so push runs are
      # never gated.
      docs_only: ${{ steps.filter.outputs.docs || 'false' }}
    steps:
      - name: Check whether the PR diff is docs-only
        id: filter
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files=$(gh api "repos/${REPO}/pulls/${PR}/files" --paginate --jq '.[].filename')
          echo "changed files:"; echo "$files"
          # Docs set: markdown anywhere, docs/, issue templates, .claude AI
          # tooling, LICENSE. ANY file outside it => full pipeline.
          non_docs=$(echo "$files" | grep -vE '\.md$|^docs/|^\.github/ISSUE_TEMPLATE/|^\.claude/|^LICENSE$' || true)
          if [ -n "$non_docs" ]; then
            echo "non-docs files present:"; echo "$non_docs"
            echo "docs=false" >> "$GITHUB_OUTPUT"
          else
            echo "diff is docs-only"
            echo "docs=true" >> "$GITHUB_OUTPUT"
          fi

  lint:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # version MUST match GOLANGCI_VERSION in the Makefile — bump both together.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  # Dead-reference check over the markdown (#125): unconditional like lint —
  # it is the check that actually validates a docs-only diff, and on code
  # diffs it catches renames of files the docs point at. Seconds to run.
  docs:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: make docs-check

  test:
    needs: [changes]
    if: ${{ !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.docs_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test test-integration

  client:
    needs: [changes]
    if: ${{ !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.docs_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      # The contract-drift gate: regenerates protocol.gen.ts and fails on diff.
      - run: make protocol-check
      - run: make client-check
      - run: make client

  e2e:
    needs: [changes]
    if: ${{ !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.docs_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: cd client && npm ci && npx playwright install --with-deps chromium
      - run: make e2e

  # Build once, after the suite is green, so a published image always
  # implies the tests passed for that commit. Release tags do not build
  # here; the promote job retags this image instead.
  # On a docs-only PR the needed jobs are skipped, which skips this one
  # too (GitHub skips a job whose needs did not all succeed) — no image is
  # built for a docs-only diff. Push-event runs never skip (see changes).
  docker-build:
    needs: [lint, test, client, e2e]
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Needed for cosign keyless signing (sigstore/fulcio OIDC) off PRs.
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No semver tags here: version tags are created by the promote job.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=edge,branch=main
          flavor: |
            latest=auto

      # Build (and, off PRs, push) the image using the existing Dockerfile.
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign the pushed digest. The signature binds to the digest, so the
      # promote job's retags inherit it.
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes "{}@${DIGEST}"

  # Promote the already-built, already-tested main image for this commit to
  # its release tags. No rebuild, no re-run of the suite: the tag is cut on a
  # main commit, so its sha-<commit> image already exists and was signed.
  promote:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto

      - name: Promote main image to release tags
        env:
          SRC: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          # Fail loudly if the tested main image is missing: a v* tag must
          # point at a commit whose main build pushed its sha image.
          if ! docker buildx imagetools inspect "$SRC" >/dev/null 2>&1; then
            echo "ERROR: ${SRC} not found; tag a commit that was built on main" >&2
            exit 1
          fi
          args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && args+=( --tag "$tag" )
          done <<< "$TAGS"
          docker buildx imagetools create "${args[@]}" "$SRC"
