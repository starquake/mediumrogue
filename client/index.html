<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medium Rogue</title>
    <style>
      :root {
        color-scheme: dark;
        --fg: #c8e6c9;
        --dim: #5a7a5c;
        --bg: #0b0f0b;
        --accent: #7cb342;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: "Courier New", monospace;
      }
      canvas {
        display: block;
      }
      /* Left column: the HUD (turn/status/stats/timer/combat-panel) stacked
         above the quest/gear panels, as ONE fixed-position flex column
         (item 5, playtest feedback batch 3 — was two INDEPENDENT
         position:fixed boxes, #hud anchored at the top and #left-panels
         hardcoded to start at top:8rem, a guess at the HUD's height. The
         HUD's actual height varies — the combat panel, the copy-link
         button, and multi-line "waiting for" text all grow it past that
         guess — so the quest panel would render UNDER/behind the timer.
         A shared flex column has no guess to be wrong: #left-panels always
         starts exactly where the HUD's real rendered content ends, however
         tall that turns out to be.) The HTML-over-WebGL split itself is the
         plan's §6 design — social/status UI stays DOM, the world stays
         canvas. */
      #left-column {
        position: fixed;
        top: 0.75rem;
        left: 1rem;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        pointer-events: none;
        /* Stop above the bottom-anchored chat panel's zone (~12.2rem tall +
           1rem offset + breathing room) so a tall quest board scrolls inside
           #left-panels (see below) instead of running underneath the chat
           box on a short window. */
        max-height: calc(100vh - 0.75rem - 14.5rem);
      }
      #hud {
        text-shadow: 0 1px 2px #000;
      }
      #hud h1 {
        margin: 0 0 0.25rem;
        font-weight: normal;
        letter-spacing: 0.3em;
        color: var(--dim);
        font-size: 0.85rem;
        text-transform: uppercase;
      }
      #turn-row {
        font-size: 1.1rem;
      }
      #status {
        margin-top: 0.25rem;
        color: var(--dim);
        font-size: 0.85rem;
      }
      #status[data-connected="true"]::before {
        content: "● ";
        color: #7cb342;
      }
      #status[data-connected="false"]::before {
        content: "○ ";
      }
      #stats {
        margin-top: 0.25rem;
        color: var(--dim);
        font-size: 0.85rem;
      }
      /* Character link: a copyable `#t=<token>` URL that re-joins the SAME
         character on any browser/device (main.ts's setIdentityLink /
         net/session.ts's importIdentityFromFragment). #hud is click-through
         (pointer-events: none) so this re-enables it on itself, same
         discipline as #chat-panel/#roster-panel. Hidden until joined. */
      #copy-link {
        display: block;
        margin-top: 0.4rem;
        padding: 0.15rem 0.5rem;
        font-family: inherit;
        font-size: 0.75rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
        cursor: pointer;
        pointer-events: auto;
      }
      #copy-link:hover {
        background: #2a3d2b;
        border-color: #7cb342;
      }
      #copy-link[hidden] {
        display: none;
      }
      #copy-link.copied {
        color: #7cb342;
        border-color: #7cb342;
      }
      /* Inventory toggle: the character/paper-doll panel is large, so it is
         not always-on — the `i` key (input/keys.ts) and this HUD button open
         and close it. Same click-through-HUD discipline as #copy-link. */
      #toggle-inventory {
        display: block;
        margin-top: 0.4rem;
        padding: 0.15rem 0.5rem;
        font-family: inherit;
        font-size: 0.75rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
        cursor: pointer;
        pointer-events: auto;
      }
      #toggle-inventory:hover {
        background: #2a3d2b;
        border-color: var(--accent);
      }
      #toggle-inventory[hidden] {
        display: none;
      }
      #toggle-inventory.open {
        color: var(--accent);
        border-color: var(--accent);
      }
      #turn-timer {
        margin-top: 0.4rem;
        width: 8rem;
        height: 0.4rem;
        background: #1a241a;
        border: 1px solid var(--dim);
      }
      #turn-timer-fill {
        height: 100%;
        width: 0%;
        background: #7cb342;
      }
      #turn-timer[data-phase="playback"] #turn-timer-fill {
        background: var(--dim);
      }
      /* Combat bubble panel: replaces the WeGo turn-timer while this client's
         entity is frozen in a fight — the world clock isn't what's advancing
         it anymore, patience is. */
      #combat-panel {
        margin-top: 0.4rem;
        color: #ffcc33;
        font-size: 0.85rem;
      }
      #combat-panel[hidden] {
        display: none;
      }
      /* Start screen: character creation, shown only for a brand-new player
         (no stored identity — see main.ts's isNewPlayer) while the map/
         engine load behind it. Highest z-index in the page — it overlays
         everything, HUD included — until Enter fires the join. A returning
         player's stored identity skips this entirely (their token already
         fixes class/species server-side). */
      #start-screen {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: rgba(11, 15, 11, 0.97);
      }
      #start-screen[hidden] {
        display: none;
      }
      #start-panel {
        width: min(46rem, 94vw);
        max-height: 90vh;
        overflow-y: auto;
        background: rgba(11, 15, 11, 0.92);
        border: 1px solid var(--dim);
        padding: 2rem 2.5rem;
        text-shadow: 0 1px 2px #000;
      }
      #start-panel h1 {
        margin: 0 0 0.25rem;
        font-weight: normal;
        letter-spacing: 0.45em;
        color: var(--dim);
        font-size: 1.05rem;
        text-transform: uppercase;
        text-align: center;
      }
      #start-panel .tagline {
        text-align: center;
        color: var(--dim);
        font-size: 0.8rem;
        margin-bottom: 1.6rem;
      }
      #start-panel .label {
        display: block;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin: 1.2rem 0 0.45rem;
      }
      #start-name {
        width: 100%;
        padding: 0.55rem 0.7rem;
        font-family: inherit;
        font-size: 1rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
      }
      #start-name:focus {
        outline: none;
        border-color: #7cb342;
      }
      #start-panel .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.6rem;
      }
      /* Cards are real <button>s (keyboard operability: free focus/Enter/
         Space semantics), so undo the UA button styling to keep the card
         look: inherit the page font, left-align, block-flow contents. */
      #start-panel .card {
        display: block;
        width: 100%;
        font-family: inherit;
        font-size: inherit;
        text-align: left;
        color: var(--fg);
        border: 1px solid var(--dim);
        background: #101710;
        padding: 0.7rem 0.8rem;
        cursor: pointer;
      }
      #start-panel .card:hover {
        background: #18251a;
      }
      #start-panel .card:focus-visible {
        outline: 2px solid #7cb342;
        outline-offset: 2px;
      }
      #start-panel .card.selected {
        border-color: #7cb342;
        background: #1b2b1c;
        box-shadow: 0 0 0 1px #7cb342 inset;
      }
      #start-panel .card .glyph {
        display: inline-block;
        width: 1.7rem;
        height: 1.7rem;
        border-radius: 50%;
        text-align: center;
        line-height: 1.7rem;
        font-weight: bold;
        color: #0b0f0b;
        margin-bottom: 0.45rem;
      }
      /* .card-name/.card-desc are spans (a <button> only permits phrasing
         content — no h3/p inside), styled to read as heading + body text. */
      #start-panel .card .card-name {
        display: block;
        margin: 0 0 0.3rem;
        font-size: 0.95rem;
        font-weight: bold;
      }
      #start-panel .card .card-desc {
        display: block;
        margin: 0;
        font-size: 0.72rem;
        line-height: 1.45;
        color: var(--dim);
      }
      #start-panel .card.selected .card-desc {
        color: var(--fg);
      }
      #start-panel .fighter .glyph {
        background: #8fd0ff;
      }
      #start-panel .rogue .glyph {
        background: #c8b458;
      }
      #start-panel .mage .glyph {
        background: #c78fdf;
      }
      #start-panel .species .glyph {
        background: #8fe08f;
      }
      #start-enter {
        margin-top: 1.8rem;
        width: 100%;
        padding: 0.8rem;
        font-family: inherit;
        font-size: 1rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #0b0f0b;
        background: #7cb342;
        border: 1px solid #7cb342;
        cursor: pointer;
        font-weight: bold;
      }
      #start-enter:hover {
        background: #8fce53;
      }
      #start-panel .hint {
        text-align: center;
        color: var(--dim);
        font-size: 0.7rem;
        margin-top: 0.7rem;
      }
      /* Chat overlay: #chat-root spans a corner of the viewport but is itself
         click-through (pointer-events: none) so a map click landing on empty
         overlay space still reaches the Pixi canvas underneath — only
         #chat-panel (the actual visible box) re-enables pointer events. */
      #chat-root {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        z-index: 10;
        pointer-events: none;
      }
      #chat-panel {
        pointer-events: auto;
        width: 320px;
        max-width: calc(100vw - 2rem);
        display: flex;
        flex-direction: column;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        text-shadow: 0 1px 2px #000;
      }
      #chat-messages {
        height: 10rem;
        overflow-y: auto;
        padding: 0.4rem 0.6rem;
        font-size: 0.8rem;
        line-height: 1.4;
      }
      .chat-line {
        word-wrap: break-word;
      }
      .chat-line .chat-sender {
        color: var(--dim);
        margin-right: 0.35rem;
      }
      .chat-line .chat-sender::after {
        content: ":";
      }
      .chat-line.chat-system {
        color: #ffcc33;
        font-style: italic;
      }
      .chat-line.chat-system .chat-sender {
        color: #ffcc33;
      }
      #chat-form {
        display: flex;
        border-top: 1px solid var(--dim);
      }
      #chat-input {
        flex: 1;
        padding: 0.4rem 0.5rem;
        font-family: inherit;
        font-size: 0.8rem;
        color: var(--fg);
        background: #16201a;
        border: none;
      }
      #chat-input:focus {
        outline: none;
      }
      #chat-form button {
        padding: 0.4rem 0.6rem;
        font-family: inherit;
        font-size: 0.8rem;
        color: var(--fg);
        background: #16201a;
        border: none;
        border-left: 1px solid var(--dim);
        cursor: pointer;
      }
      #chat-form button:hover {
        background: #2a3d2b;
      }
      /* Roster overlay: mirrors #chat-root's click-through discipline — the
         root spans a corner of the viewport but only the visible panel
         re-enables pointer events, so empty overlay space still passes clicks
         through to the map. Placed top-right-ish, well clear of the bottom-
         left chat and the top-right class/species pickers. */
      #roster-root {
        position: fixed;
        top: 8rem;
        right: 1rem;
        z-index: 10;
        pointer-events: none;
      }
      #roster-panel {
        pointer-events: auto;
        width: 10rem;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.4rem 0.6rem;
        text-shadow: 0 1px 2px #000;
      }
      #roster-title {
        margin-bottom: 0.25rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .roster-member {
        font-size: 0.85rem;
        line-height: 1.4;
      }
      /* Quest + gear stack below the HUD, both inside #left-column (see
         above) — no fixed position/offset of their own any more. Flex flow
         — not per-panel fixed offsets — is what keeps them from ever
         overlapping each other: a tall quest board simply pushes the gear
         panel down. Scrolls internally (rather than pushing off-screen)
         once the column's max-height is hit; individual panels stay
         click-through (pointer-events: none) except the visible panel
         content itself, same discipline as #chat-root. */
      #left-panels {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        pointer-events: none;
        overflow-y: auto;
        scrollbar-width: thin;
      }
      #quest-root {
        pointer-events: none;
      }
      #quest-panel {
        pointer-events: auto;
        /* 23rem (was 20rem, item 5 playtest feedback batch 3): wide enough
           that a typical one-quest row ("#4 Scout the far shore: reach
           (0, 13) · 20 XP") fits on one line instead of wrapping. */
        width: 23rem;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.4rem 0.6rem;
        text-shadow: 0 1px 2px #000;
      }
      #quest-mine {
        margin-bottom: 0.4rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid var(--dim);
      }
      /* item 14, playtest batch 2: I may hold several quests at once — each
         gets its own row, separated by a thin rule (except the last, whose
         separation is #quest-mine's own border-bottom above). */
      .quest-mine-row {
        padding-bottom: 0.25rem;
        margin-bottom: 0.25rem;
        border-bottom: 1px solid rgba(90, 122, 92, 0.4);
      }
      .quest-mine-row:last-child {
        padding-bottom: 0;
        margin-bottom: 0;
        border-bottom: none;
      }
      #quest-board-title {
        margin-bottom: 0.25rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .quest-title {
        font-size: 0.85rem;
      }
      .quest-objective {
        color: var(--dim);
        font-size: 0.8rem;
      }
      .quest-row {
        font-size: 0.8rem;
        line-height: 1.4;
        /* Hang-indent: wrapped quest lines tuck under their own first line's
           text instead of flushing left under the "#N" marker. */
        padding-left: 1.2em;
        text-indent: -1.2em;
      }
      /* Character / paper-doll panel (inventory-slots milestone): the
         Vitruvian hex-slot layout from the approved mockup
         (scratchpad/inventory-mock.html). A large, TOGGLEABLE overlay (the
         `i` key / #toggle-inventory) anchored left so the camera-centred
         player stays visible; hidden until opened. Click-through root, opaque
         panel — same discipline as the other overlays. */
      #character-root,
      #pickup-root {
        position: fixed;
        z-index: 15;
        pointer-events: none;
      }
      #character-root {
        /* Below the HUD (turn/stats/buttons/timer) so it never covers the
           inventory-toggle button; a solid panel (below) then fully covers
           the quest board while open — an inventory screen, not a peek. */
        top: 8rem;
        left: 1rem;
        max-height: calc(100vh - 9rem);
        overflow-y: auto;
      }
      /* Pickup modal: appears on walk-over regardless of the character panel
         (spec) — centred near the top, above the character panel. */
      #pickup-root {
        top: 5rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 25;
      }
      .panel {
        pointer-events: auto;
        background: rgba(11, 15, 11, 0.92);
        border: 1px solid var(--dim);
        padding: 1rem 1.2rem;
        text-shadow: 0 1px 2px #000;
      }
      #character-panel {
        pointer-events: auto;
        /* Solid (not translucent like the mock's isolated panel): in-game it
           overlays the quest board, which must not bleed through. */
        background: #0b0f0b;
        border: 1px solid var(--dim);
        padding: 1rem 1.2rem;
        text-shadow: 0 1px 2px #000;
      }
      .title {
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 0.7rem;
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .panel-close {
        font-family: inherit;
        font-size: 1rem;
        line-height: 1;
        color: var(--dim);
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 0 0.2rem;
      }
      .panel-close:hover {
        color: var(--fg);
      }
      /* Paper-doll: 8 hex slots positioned on a minimal body silhouette (the
         mockup's silhouette is a placeholder — a cleaner soft radial hint
         here; slot arrangement is the binding part). */
      .doll {
        position: relative;
        width: 21rem;
        height: 26rem;
      }
      .hex {
        position: absolute;
        width: 5.4rem;
        height: 6.2rem;
        clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
        background: var(--dim);
        border: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.15rem;
        cursor: pointer;
        padding: 0.4rem;
        color: var(--fg);
        font-family: inherit;
        isolation: isolate;
      }
      /* A clip-path element can't carry a real border — an inset box-shadow
         gets clipped away on the diagonal edges (the old "border only on the
         left/right" bug). Instead the parent's background IS the rim, and this
         inset inner hexagon paints the fill on top, leaving an even edge all
         the way around. */
      .hex::before {
        content: "";
        position: absolute;
        inset: 2px;
        clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
        background: #101710;
        z-index: 0;
      }
      .hex > * {
        position: relative;
        z-index: 1;
      }
      .hex:disabled {
        cursor: default;
      }
      .hex.filled {
        background: var(--accent);
      }
      .hex.filled::before {
        background: #16241a;
      }
      .hex.filled:hover:not(:disabled)::before {
        background: #1d3021;
      }
      .hex .slotname {
        color: var(--dim);
        font-size: 0.6rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .hex .itemname {
        font-size: 0.62rem;
        text-align: center;
        line-height: 1.25;
        color: var(--fg);
      }
      .hex .empty {
        color: #3d523f;
        font-size: 1.1rem;
      }
      .hex.head {
        left: 7.8rem;
        top: 0;
      }
      .hex.hands {
        left: 0.6rem;
        top: 5rem;
      }
      .hex.ring {
        right: 0.6rem;
        top: 5rem;
      }
      .hex.amulet {
        left: 7.8rem;
        top: 6.6rem;
      }
      .hex.weap1 {
        left: 0.6rem;
        top: 12rem;
      }
      .hex.body {
        left: 7.8rem;
        top: 13.2rem;
      }
      .hex.weap2 {
        right: 0.6rem;
        top: 12rem;
      }
      .hex.feet {
        left: 7.8rem;
        top: 19.8rem;
      }
      /* Hover stat tooltip: an item's stats plus the delta vs the item equipped
         in the same slot. Fixed-positioned beside the hovered hex/cell (see
         showHover); pointer-events off so it never eats a click. */
      .stat-tip {
        position: fixed;
        z-index: 60;
        width: 14rem;
        pointer-events: none;
        background: #0d140d;
        border: 1px solid var(--accent);
        padding: 0.5rem 0.6rem;
        color: var(--fg);
        font-size: 0.72rem;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
      }
      .stat-tip .tt-name {
        font-weight: bold;
        margin-bottom: 0.15rem;
      }
      .stat-tip .tt-cmp {
        color: var(--dim);
        font-size: 0.62rem;
        margin-bottom: 0.35rem;
      }
      .stat-tip .tt-row {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        line-height: 1.6;
      }
      .stat-tip .tt-label {
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.58rem;
        align-self: center;
      }
      .stat-tip .tt-val {
        font-variant-numeric: tabular-nums;
      }
      .stat-tip .tt-delta.up {
        color: #7cd66c;
      }
      .stat-tip .tt-delta.down {
        color: #e06c6c;
      }
      .stat-tip .tt-effect {
        margin-top: 0.4rem;
        line-height: 1.35;
        color: var(--fg);
      }
      .stat-tip .tt-flavor {
        margin-top: 0.4rem;
        font-style: italic;
        line-height: 1.35;
        color: var(--dim);
      }
      .stat-tip .tt-none {
        margin-top: 0.4rem;
        color: var(--dim);
      }
      /* Backpack: 4 fixed cells beneath the paper-doll, stack counts + a
         per-item drop button. */
      .backpack {
        display: flex;
        gap: 0.6rem;
      }
      .cell {
        width: 4.6rem;
        height: 4.6rem;
        border: 1px solid var(--dim);
        background: #101710;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.2rem;
        position: relative;
        font-size: 0.62rem;
        text-align: center;
        padding: 0.3rem;
      }
      .cell.filled {
        border-color: var(--accent);
        background: #16241a;
      }
      .cell .empty {
        color: #3d523f;
        font-size: 1.1rem;
      }
      .cell-use {
        font-family: inherit;
        font-size: 0.62rem;
        color: var(--fg);
        background: transparent;
        border: none;
        cursor: pointer;
        text-align: center;
        line-height: 1.2;
        padding: 0;
      }
      .cell-use:hover:not(:disabled) {
        color: var(--accent);
      }
      .cell-use:disabled {
        cursor: default;
        color: var(--dim);
      }
      .cell .count {
        position: absolute;
        right: 0.25rem;
        bottom: 0.15rem;
        color: var(--accent);
        font-weight: bold;
        font-size: 0.75rem;
      }
      .cell .drop {
        margin-top: 0.15rem;
        font-family: inherit;
        font-size: 0.55rem;
        color: var(--dim);
        border: 1px solid var(--dim);
        padding: 0.05rem 0.3rem;
        background: #0d130d;
        cursor: pointer;
      }
      .cell .drop:hover:not(:disabled) {
        color: #ff6b5f;
        border-color: #ff6b5f;
      }
      .cell .drop:disabled {
        cursor: default;
        opacity: 0.5;
      }
      /* Pickup modal: rows of name + type with an individual take button;
         a rejected row shows inline backpack-full feedback and stays. */
      .prompt {
        width: 18rem;
      }
      .rowlist {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }
      .grow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        border: 1px solid #22331f;
        background: #0d130d;
        padding: 0.45rem 0.6rem;
      }
      .grow.rejected {
        border-color: #5a4a1e;
      }
      .grow .itemline {
        font-size: 0.85rem;
      }
      .grow .typeline {
        color: var(--dim);
        font-size: 0.75rem;
      }
      .grow .full {
        margin-top: 0.25rem;
        color: #ffcc33;
        font-size: 0.68rem;
      }
      .grow button {
        flex: none;
        width: 4.2rem;
        padding: 0.3rem;
        font-family: inherit;
        font-size: 0.8rem;
        cursor: pointer;
        border: 1px solid var(--accent);
        background: #1b2b1c;
        color: var(--fg);
      }
      .grow button:disabled {
        opacity: 0.45;
        cursor: default;
        border-color: var(--dim);
      }
      #pickup-modal .buttons button {
        width: 100%;
        padding: 0.45rem;
        font-family: inherit;
        font-size: 0.85rem;
        cursor: pointer;
        border: 1px solid var(--dim);
        background: #16201a;
        color: var(--fg);
      }
      #pickup-modal .buttons button:hover {
        background: #2a3d2b;
        border-color: var(--accent);
      }
      /* Enemy hover tooltip (item 13, playtest batch 2): a small DOM tooltip
         near the cursor on a monster hex — pointer-events: none throughout
         so it can never itself block the click it's floating over. */
      #hover-tooltip {
        position: fixed;
        z-index: 20;
        pointer-events: none;
        background: rgba(11, 15, 11, 0.9);
        border: 1px solid var(--dim);
        padding: 0.25rem 0.5rem;
        font-size: 0.8rem;
        text-shadow: 0 1px 2px #000;
        white-space: nowrap;
      }
      #hover-tooltip[hidden] {
        display: none;
      }
      #hover-tooltip .tooltip-kind {
        color: var(--fg);
      }
      #hover-tooltip .tooltip-hp {
        color: #d6544f;
        margin-left: 0.4em;
      }
    </style>
  </head>
  <body>
    <div id="left-column">
      <header id="hud">
        <h1>Medium Rogue</h1>
        <div id="turn-row">turn <span id="turn">—</span></div>
        <div id="status" data-connected="false">connecting…</div>
        <div id="stats">Lv — · —/— XP</div>
        <button id="copy-link" type="button" hidden>copy character link</button>
        <button id="toggle-inventory" type="button" hidden>inventory (i)</button>
        <div id="turn-timer" data-phase="input"><div id="turn-timer-fill"></div></div>
        <div id="combat-panel" hidden>
          In combat — waiting for: <span id="combat-waiting"></span> · <span id="combat-patience"></span>s left
        </div>
      </header>
      <div id="left-panels">
        <div id="quest-root"></div>
      </div>
    </div>
    <div id="character-root"></div>
    <div id="pickup-root"></div>
    <div id="start-screen" hidden>
      <div id="start-panel">
        <h1>Medium Rogue</h1>
        <!-- Derive-free wording (PR #50 review): no literal cadence number
             here to go stale when TurnSeconds is retuned again. -->
        <div class="tagline">a shared world · everyone moves on the same beat · bring friends</div>

        <label class="label" for="start-name">Your name</label>
        <input id="start-name" type="text" autocomplete="off" maxlength="24" placeholder="traveler" />

        <div class="label">Class — how you fight</div>
        <div class="cards">
          <button type="button" class="card fighter selected" data-class="fighter">
            <span class="glyph">F</span>
            <span class="card-name">Fighter</span>
            <span class="card-desc">Steady melee, tough enough to hold the front. Medium damage, high HP.</span>
          </button>
          <button type="button" class="card rogue" data-class="rogue">
            <span class="glyph">R</span>
            <span class="card-name">Rogue</span>
            <span class="card-desc">Dagger up close, bow at range — picked automatically. Hits hardest, takes hits badly.</span>
          </button>
          <button type="button" class="card mage" data-class="mage">
            <span class="glyph">M</span>
            <span class="card-name">Mage</span>
            <span class="card-desc">Area magic from the back line — hits groups at once. Fragile.</span>
          </button>
        </div>

        <div class="label">Species — your style</div>
        <div class="cards species">
          <button type="button" class="card selected" data-species="human">
            <span class="glyph">H</span>
            <span class="card-name">Human</span>
            <span class="card-desc">Learns faster: bonus XP on every award.</span>
          </button>
          <button type="button" class="card" data-species="elf">
            <span class="glyph">E</span>
            <span class="card-name">Elf</span>
            <span class="card-desc">Deadly precision: chance to land critical hits.</span>
          </button>
          <button type="button" class="card" data-species="dwarf">
            <span class="glyph">D</span>
            <span class="card-name">Dwarf</span>
            <span class="card-desc">Stone-tough: shrugs off part of every hit.</span>
          </button>
        </div>

        <button id="start-enter" type="button">Enter the world</button>
        <div class="hint">returning players skip this screen — your character remembers you</div>
      </div>
    </div>
    <div id="chat-root"></div>
    <div id="roster-root"></div>
    <div id="hover-tooltip" hidden>
      <span class="tooltip-kind"></span><span class="tooltip-hp"></span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
