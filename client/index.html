<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medium Rogue</title>
    <style>
      :root {
        color-scheme: dark;
        --fg: #c8e6c9;
        --dim: #5a7a5c;
        --bg: #0b0f0b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: "Courier New", monospace;
      }
      canvas {
        display: block;
      }
      /* HUD floats over the canvas: the HTML-over-WebGL split is the plan's
         §6 design — social/status UI stays DOM, the world stays canvas. */
      #hud {
        position: fixed;
        top: 0.75rem;
        left: 1rem;
        z-index: 10;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #hud h1 {
        margin: 0 0 0.25rem;
        font-weight: normal;
        letter-spacing: 0.3em;
        color: var(--dim);
        font-size: 0.85rem;
        text-transform: uppercase;
      }
      #turn-row {
        font-size: 1.1rem;
      }
      #status {
        margin-top: 0.25rem;
        color: var(--dim);
        font-size: 0.85rem;
      }
      #status[data-connected="true"]::before {
        content: "● ";
        color: #7cb342;
      }
      #status[data-connected="false"]::before {
        content: "○ ";
      }
      #stats {
        margin-top: 0.25rem;
        color: var(--dim);
        font-size: 0.85rem;
      }
      #turn-timer {
        margin-top: 0.4rem;
        width: 8rem;
        height: 0.4rem;
        background: #1a241a;
        border: 1px solid var(--dim);
      }
      #turn-timer-fill {
        height: 100%;
        width: 0%;
        background: #7cb342;
      }
      #turn-timer[data-phase="playback"] #turn-timer-fill {
        background: var(--dim);
      }
      /* Combat bubble panel: replaces the WeGo turn-timer while this client's
         entity is frozen in a fight — the world clock isn't what's advancing
         it anymore, patience is. */
      #combat-panel {
        margin-top: 0.4rem;
        color: #ffcc33;
        font-size: 0.85rem;
      }
      #combat-panel[hidden] {
        display: none;
      }
      /* Class picker: shown only for a brand-new player (no stored identity)
         while the map/engine load, so there's a real window to choose before
         the join fires — a returning player's token already fixes their
         class server-side, so this never appears for them. Unlike #hud it
         takes pointer events (the buttons must be clickable). */
      #class-picker {
        position: fixed;
        top: 0.75rem;
        right: 1rem;
        z-index: 11;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.5rem 0.75rem;
        text-align: center;
        text-shadow: 0 1px 2px #000;
      }
      #class-picker[hidden] {
        display: none;
      }
      #class-picker-label {
        margin-bottom: 0.35rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      #class-picker button {
        margin: 0 0.15rem;
        padding: 0.3rem 0.6rem;
        font-family: inherit;
        font-size: 0.85rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
        cursor: pointer;
      }
      #class-picker button.selected,
      #class-picker button:hover {
        background: #2a3d2b;
        border-color: #7cb342;
      }
      /* Species picker: mirrors #class-picker exactly (same visibility rule,
         same styling) — shown beside it for a brand-new player. */
      #species-picker {
        position: fixed;
        top: 0.75rem;
        right: 13rem;
        z-index: 11;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.5rem 0.75rem;
        text-align: center;
        text-shadow: 0 1px 2px #000;
      }
      #species-picker[hidden] {
        display: none;
      }
      #species-picker-label {
        margin-bottom: 0.35rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      #species-picker button {
        margin: 0 0.15rem;
        padding: 0.3rem 0.6rem;
        font-family: inherit;
        font-size: 0.85rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
        cursor: pointer;
      }
      #species-picker button.selected,
      #species-picker button:hover {
        background: #2a3d2b;
        border-color: #7cb342;
      }
      /* Name field: mirrors the pickers' visibility rule (brand-new player
         only) and styling, but is a text input rather than buttons. Sits
         below the two pickers so all three read top-to-bottom as one join
         flow. */
      #name-picker {
        position: fixed;
        top: 4.5rem;
        right: 1rem;
        z-index: 11;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.5rem 0.75rem;
        text-align: center;
        text-shadow: 0 1px 2px #000;
      }
      #name-picker[hidden] {
        display: none;
      }
      #name-picker-label {
        margin-bottom: 0.35rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      #name-input {
        width: 10rem;
        padding: 0.3rem 0.5rem;
        font-family: inherit;
        font-size: 0.85rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
      }
      #name-input:focus {
        outline: none;
        border-color: #7cb342;
      }
      /* Chat overlay: #chat-root spans a corner of the viewport but is itself
         click-through (pointer-events: none) so a map click landing on empty
         overlay space still reaches the Pixi canvas underneath — only
         #chat-panel (the actual visible box) re-enables pointer events. */
      #chat-root {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        z-index: 10;
        pointer-events: none;
      }
      #chat-panel {
        pointer-events: auto;
        width: 320px;
        max-width: calc(100vw - 2rem);
        display: flex;
        flex-direction: column;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        text-shadow: 0 1px 2px #000;
      }
      #chat-messages {
        height: 10rem;
        overflow-y: auto;
        padding: 0.4rem 0.6rem;
        font-size: 0.8rem;
        line-height: 1.4;
      }
      .chat-line {
        word-wrap: break-word;
      }
      .chat-line .chat-sender {
        color: var(--dim);
        margin-right: 0.35rem;
      }
      .chat-line .chat-sender::after {
        content: ":";
      }
      .chat-line.chat-system {
        color: #ffcc33;
        font-style: italic;
      }
      .chat-line.chat-system .chat-sender {
        color: #ffcc33;
      }
      #chat-form {
        display: flex;
        border-top: 1px solid var(--dim);
      }
      #chat-input {
        flex: 1;
        padding: 0.4rem 0.5rem;
        font-family: inherit;
        font-size: 0.8rem;
        color: var(--fg);
        background: #16201a;
        border: none;
      }
      #chat-input:focus {
        outline: none;
      }
      #chat-form button {
        padding: 0.4rem 0.6rem;
        font-family: inherit;
        font-size: 0.8rem;
        color: var(--fg);
        background: #16201a;
        border: none;
        border-left: 1px solid var(--dim);
        cursor: pointer;
      }
      #chat-form button:hover {
        background: #2a3d2b;
      }
      /* Roster overlay: mirrors #chat-root's click-through discipline — the
         root spans a corner of the viewport but only the visible panel
         re-enables pointer events, so empty overlay space still passes clicks
         through to the map. Placed top-right-ish, well clear of the bottom-
         left chat and the top-right class/species pickers. */
      #roster-root {
        position: fixed;
        top: 8rem;
        right: 1rem;
        z-index: 10;
        pointer-events: none;
      }
      #roster-panel {
        pointer-events: auto;
        width: 10rem;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.4rem 0.6rem;
        text-shadow: 0 1px 2px #000;
      }
      #roster-title {
        margin-bottom: 0.25rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .roster-member {
        font-size: 0.85rem;
        line-height: 1.4;
      }
      /* Quest overlay: mirrors #chat-root/#roster-root's click-through
         discipline. Placed on the left edge below the HUD bar and above the
         (much shorter, bottom-anchored) chat panel, so it never collides with
         either — nor with the pre-join pickers, which live on the right and
         only show before joining, while the quest board is visible from the
         very first bundle. */
      #quest-root {
        position: fixed;
        top: 8rem;
        left: 1rem;
        z-index: 10;
        pointer-events: none;
      }
      #quest-panel {
        pointer-events: auto;
        width: 16rem;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.4rem 0.6rem;
        text-shadow: 0 1px 2px #000;
      }
      #quest-mine {
        margin-bottom: 0.4rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid var(--dim);
      }
      #quest-board-title {
        margin-bottom: 0.25rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .quest-title {
        font-size: 0.85rem;
      }
      .quest-objective {
        color: var(--dim);
        font-size: 0.8rem;
      }
      .quest-row {
        font-size: 0.8rem;
        line-height: 1.4;
      }
      /* Gear overlay: mirrors #quest-root/#quest-panel exactly (click-through
         root, opaque panel), stacked directly below the quest panel on the
         left edge — both are "always visible once joined" HUD, unlike the
         bottom-anchored chat or the pre-join-only pickers. */
      #gear-root {
        position: fixed;
        top: 18rem;
        left: 1rem;
        z-index: 10;
        pointer-events: none;
      }
      #gear-panel {
        pointer-events: auto;
        width: 16rem;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.4rem 0.6rem;
        text-shadow: 0 1px 2px #000;
      }
      #gear-title {
        margin-bottom: 0.25rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .gear-row {
        display: flex;
        align-items: baseline;
        gap: 0.4rem;
        font-size: 0.8rem;
        line-height: 1.4;
      }
      .gear-row button {
        font-family: inherit;
        font-size: 0.7rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
        padding: 0.05rem 0.35rem;
        cursor: pointer;
      }
      .gear-row button:hover:not(:disabled) {
        background: #2a3d2b;
        border-color: #7cb342;
      }
      .gear-row button:disabled {
        color: var(--dim);
        cursor: default;
      }
      .gear-equipped .gear-name {
        color: #7cb342;
      }
      .gear-stats {
        color: var(--dim);
      }
      .gear-desc {
        color: var(--dim);
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <header id="hud">
      <h1>Medium Rogue</h1>
      <div id="turn-row">turn <span id="turn">—</span></div>
      <div id="status" data-connected="false">connecting…</div>
      <div id="stats">Lv — · —/— XP</div>
      <div id="turn-timer" data-phase="input"><div id="turn-timer-fill"></div></div>
      <div id="combat-panel" hidden>
        In combat — waiting for: <span id="combat-waiting"></span> · <span id="combat-patience"></span>s left
      </div>
    </header>
    <div id="class-picker" hidden>
      <div id="class-picker-label">Choose your class</div>
      <button type="button" data-class="fighter">Fighter</button>
      <button type="button" data-class="rogue">Rogue</button>
      <button type="button" data-class="mage">Mage</button>
    </div>
    <div id="species-picker" hidden>
      <div id="species-picker-label">Choose your species</div>
      <button type="button" data-species="human">Human</button>
      <button type="button" data-species="elf">Elf</button>
      <button type="button" data-species="dwarf">Dwarf</button>
    </div>
    <div id="name-picker" hidden>
      <label id="name-picker-label" for="name-input">Your name</label><br />
      <input id="name-input" type="text" autocomplete="off" maxlength="24" placeholder="traveler" />
    </div>
    <div id="chat-root"></div>
    <div id="roster-root"></div>
    <div id="quest-root"></div>
    <div id="gear-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
