<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medium Rogue</title>
    <style>
      :root {
        color-scheme: dark;
        --fg: #c8e6c9;
        --dim: #5a7a5c;
        --bg: #0b0f0b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: "Courier New", monospace;
      }
      canvas {
        display: block;
      }
      /* HUD floats over the canvas: the HTML-over-WebGL split is the plan's
         §6 design — social/status UI stays DOM, the world stays canvas. */
      #hud {
        position: fixed;
        top: 0.75rem;
        left: 1rem;
        z-index: 10;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #hud h1 {
        margin: 0 0 0.25rem;
        font-weight: normal;
        letter-spacing: 0.3em;
        color: var(--dim);
        font-size: 0.85rem;
        text-transform: uppercase;
      }
      #turn-row {
        font-size: 1.1rem;
      }
      #status {
        margin-top: 0.25rem;
        color: var(--dim);
        font-size: 0.85rem;
      }
      #status[data-connected="true"]::before {
        content: "● ";
        color: #7cb342;
      }
      #status[data-connected="false"]::before {
        content: "○ ";
      }
      #stats {
        margin-top: 0.25rem;
        color: var(--dim);
        font-size: 0.85rem;
      }
      /* Character link: a copyable `#t=<token>` URL that re-joins the SAME
         character on any browser/device (main.ts's setIdentityLink /
         net/session.ts's importIdentityFromFragment). #hud is click-through
         (pointer-events: none) so this re-enables it on itself, same
         discipline as #chat-panel/#roster-panel. Hidden until joined. */
      #copy-link {
        display: block;
        margin-top: 0.4rem;
        padding: 0.15rem 0.5rem;
        font-family: inherit;
        font-size: 0.75rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
        cursor: pointer;
        pointer-events: auto;
      }
      #copy-link:hover {
        background: #2a3d2b;
        border-color: #7cb342;
      }
      #copy-link[hidden] {
        display: none;
      }
      #copy-link.copied {
        color: #7cb342;
        border-color: #7cb342;
      }
      #turn-timer {
        margin-top: 0.4rem;
        width: 8rem;
        height: 0.4rem;
        background: #1a241a;
        border: 1px solid var(--dim);
      }
      #turn-timer-fill {
        height: 100%;
        width: 0%;
        background: #7cb342;
      }
      #turn-timer[data-phase="playback"] #turn-timer-fill {
        background: var(--dim);
      }
      /* Combat bubble panel: replaces the WeGo turn-timer while this client's
         entity is frozen in a fight — the world clock isn't what's advancing
         it anymore, patience is. */
      #combat-panel {
        margin-top: 0.4rem;
        color: #ffcc33;
        font-size: 0.85rem;
      }
      #combat-panel[hidden] {
        display: none;
      }
      /* Start screen: character creation, shown only for a brand-new player
         (no stored identity — see main.ts's isNewPlayer) while the map/
         engine load behind it. Highest z-index in the page — it overlays
         everything, HUD included — until Enter fires the join. A returning
         player's stored identity skips this entirely (their token already
         fixes class/species server-side). */
      #start-screen {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: rgba(11, 15, 11, 0.97);
      }
      #start-screen[hidden] {
        display: none;
      }
      #start-panel {
        width: min(46rem, 94vw);
        max-height: 90vh;
        overflow-y: auto;
        background: rgba(11, 15, 11, 0.92);
        border: 1px solid var(--dim);
        padding: 2rem 2.5rem;
        text-shadow: 0 1px 2px #000;
      }
      #start-panel h1 {
        margin: 0 0 0.25rem;
        font-weight: normal;
        letter-spacing: 0.45em;
        color: var(--dim);
        font-size: 1.05rem;
        text-transform: uppercase;
        text-align: center;
      }
      #start-panel .tagline {
        text-align: center;
        color: var(--dim);
        font-size: 0.8rem;
        margin-bottom: 1.6rem;
      }
      #start-panel .label {
        display: block;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin: 1.2rem 0 0.45rem;
      }
      #start-name {
        width: 100%;
        padding: 0.55rem 0.7rem;
        font-family: inherit;
        font-size: 1rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
      }
      #start-name:focus {
        outline: none;
        border-color: #7cb342;
      }
      #start-panel .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.6rem;
      }
      /* Cards are real <button>s (keyboard operability: free focus/Enter/
         Space semantics), so undo the UA button styling to keep the card
         look: inherit the page font, left-align, block-flow contents. */
      #start-panel .card {
        display: block;
        width: 100%;
        font-family: inherit;
        font-size: inherit;
        text-align: left;
        color: var(--fg);
        border: 1px solid var(--dim);
        background: #101710;
        padding: 0.7rem 0.8rem;
        cursor: pointer;
      }
      #start-panel .card:hover {
        background: #18251a;
      }
      #start-panel .card:focus-visible {
        outline: 2px solid #7cb342;
        outline-offset: 2px;
      }
      #start-panel .card.selected {
        border-color: #7cb342;
        background: #1b2b1c;
        box-shadow: 0 0 0 1px #7cb342 inset;
      }
      #start-panel .card .glyph {
        display: inline-block;
        width: 1.7rem;
        height: 1.7rem;
        border-radius: 50%;
        text-align: center;
        line-height: 1.7rem;
        font-weight: bold;
        color: #0b0f0b;
        margin-bottom: 0.45rem;
      }
      /* .card-name/.card-desc are spans (a <button> only permits phrasing
         content — no h3/p inside), styled to read as heading + body text. */
      #start-panel .card .card-name {
        display: block;
        margin: 0 0 0.3rem;
        font-size: 0.95rem;
        font-weight: bold;
      }
      #start-panel .card .card-desc {
        display: block;
        margin: 0;
        font-size: 0.72rem;
        line-height: 1.45;
        color: var(--dim);
      }
      #start-panel .card.selected .card-desc {
        color: var(--fg);
      }
      #start-panel .fighter .glyph {
        background: #8fd0ff;
      }
      #start-panel .rogue .glyph {
        background: #c8b458;
      }
      #start-panel .mage .glyph {
        background: #c78fdf;
      }
      #start-panel .species .glyph {
        background: #8fe08f;
      }
      #start-enter {
        margin-top: 1.8rem;
        width: 100%;
        padding: 0.8rem;
        font-family: inherit;
        font-size: 1rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #0b0f0b;
        background: #7cb342;
        border: 1px solid #7cb342;
        cursor: pointer;
        font-weight: bold;
      }
      #start-enter:hover {
        background: #8fce53;
      }
      #start-panel .hint {
        text-align: center;
        color: var(--dim);
        font-size: 0.7rem;
        margin-top: 0.7rem;
      }
      /* Chat overlay: #chat-root spans a corner of the viewport but is itself
         click-through (pointer-events: none) so a map click landing on empty
         overlay space still reaches the Pixi canvas underneath — only
         #chat-panel (the actual visible box) re-enables pointer events. */
      #chat-root {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        z-index: 10;
        pointer-events: none;
      }
      #chat-panel {
        pointer-events: auto;
        width: 320px;
        max-width: calc(100vw - 2rem);
        display: flex;
        flex-direction: column;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        text-shadow: 0 1px 2px #000;
      }
      #chat-messages {
        height: 10rem;
        overflow-y: auto;
        padding: 0.4rem 0.6rem;
        font-size: 0.8rem;
        line-height: 1.4;
      }
      .chat-line {
        word-wrap: break-word;
      }
      .chat-line .chat-sender {
        color: var(--dim);
        margin-right: 0.35rem;
      }
      .chat-line .chat-sender::after {
        content: ":";
      }
      .chat-line.chat-system {
        color: #ffcc33;
        font-style: italic;
      }
      .chat-line.chat-system .chat-sender {
        color: #ffcc33;
      }
      #chat-form {
        display: flex;
        border-top: 1px solid var(--dim);
      }
      #chat-input {
        flex: 1;
        padding: 0.4rem 0.5rem;
        font-family: inherit;
        font-size: 0.8rem;
        color: var(--fg);
        background: #16201a;
        border: none;
      }
      #chat-input:focus {
        outline: none;
      }
      #chat-form button {
        padding: 0.4rem 0.6rem;
        font-family: inherit;
        font-size: 0.8rem;
        color: var(--fg);
        background: #16201a;
        border: none;
        border-left: 1px solid var(--dim);
        cursor: pointer;
      }
      #chat-form button:hover {
        background: #2a3d2b;
      }
      /* Roster overlay: mirrors #chat-root's click-through discipline — the
         root spans a corner of the viewport but only the visible panel
         re-enables pointer events, so empty overlay space still passes clicks
         through to the map. Placed top-right-ish, well clear of the bottom-
         left chat and the top-right class/species pickers. */
      #roster-root {
        position: fixed;
        top: 8rem;
        right: 1rem;
        z-index: 10;
        pointer-events: none;
      }
      #roster-panel {
        pointer-events: auto;
        width: 10rem;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.4rem 0.6rem;
        text-shadow: 0 1px 2px #000;
      }
      #roster-title {
        margin-bottom: 0.25rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .roster-member {
        font-size: 0.85rem;
        line-height: 1.4;
      }
      /* Left panel column: quest + gear stack in one fixed flex column on
         the left edge, below the HUD bar and above the (much shorter,
         bottom-anchored) chat panel. Flex flow — not per-panel fixed
         offsets — is what keeps them from ever overlapping: a tall quest
         board simply pushes the gear panel down. The column itself is
         click-through (pointer-events: none); only the visible panels
         re-enable pointer events, same discipline as #chat-root. */
      #left-panels {
        position: fixed;
        top: 8rem;
        left: 1rem;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        pointer-events: none;
      }
      #quest-root,
      #gear-root {
        pointer-events: none;
      }
      #quest-panel {
        pointer-events: auto;
        width: 20rem;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.4rem 0.6rem;
        text-shadow: 0 1px 2px #000;
      }
      #quest-mine {
        margin-bottom: 0.4rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid var(--dim);
      }
      #quest-board-title {
        margin-bottom: 0.25rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .quest-title {
        font-size: 0.85rem;
      }
      .quest-objective {
        color: var(--dim);
        font-size: 0.8rem;
      }
      .quest-row {
        font-size: 0.8rem;
        line-height: 1.4;
        /* Hang-indent: wrapped quest lines tuck under their own first line's
           text instead of flushing left under the "#N" marker. */
        padding-left: 1.2em;
        text-indent: -1.2em;
      }
      /* Gear panel: second member of the #left-panels column (see above);
         same opaque-panel-in-click-through-root discipline as the others. */
      #gear-panel {
        pointer-events: auto;
        width: 20rem;
        background: rgba(11, 15, 11, 0.85);
        border: 1px solid var(--dim);
        padding: 0.4rem 0.6rem;
        text-shadow: 0 1px 2px #000;
      }
      #gear-title {
        margin-bottom: 0.25rem;
        color: var(--dim);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .gear-row {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.15rem 0.4rem;
        font-size: 0.8rem;
        line-height: 1.4;
        margin-bottom: 0.25rem;
      }
      .gear-row button {
        font-family: inherit;
        font-size: 0.7rem;
        color: var(--fg);
        background: #16201a;
        border: 1px solid var(--dim);
        padding: 0.05rem 0.35rem;
        cursor: pointer;
      }
      .gear-row button:hover:not(:disabled) {
        background: #2a3d2b;
        border-color: #7cb342;
      }
      .gear-row button:disabled {
        color: var(--dim);
        cursor: default;
      }
      .gear-equipped .gear-name {
        color: #7cb342;
      }
      .gear-stats {
        color: var(--dim);
      }
      .gear-desc {
        color: var(--dim);
        font-style: italic;
        /* Rule text gets its own full-width line under name + stats, instead
           of squeezing into whatever tail space the first line leaves. */
        flex-basis: 100%;
      }
    </style>
  </head>
  <body>
    <header id="hud">
      <h1>Medium Rogue</h1>
      <div id="turn-row">turn <span id="turn">—</span></div>
      <div id="status" data-connected="false">connecting…</div>
      <div id="stats">Lv — · —/— XP</div>
      <button id="copy-link" type="button" hidden>copy character link</button>
      <div id="turn-timer" data-phase="input"><div id="turn-timer-fill"></div></div>
      <div id="combat-panel" hidden>
        In combat — waiting for: <span id="combat-waiting"></span> · <span id="combat-patience"></span>s left
      </div>
    </header>
    <div id="start-screen" hidden>
      <div id="start-panel">
        <h1>Medium Rogue</h1>
        <div class="tagline">a shared world · one turn every five seconds · bring friends</div>

        <label class="label" for="start-name">Your name</label>
        <input id="start-name" type="text" autocomplete="off" maxlength="24" placeholder="traveler" />

        <div class="label">Class — how you fight</div>
        <div class="cards">
          <button type="button" class="card fighter selected" data-class="fighter">
            <span class="glyph">F</span>
            <span class="card-name">Fighter</span>
            <span class="card-desc">Steady melee, tough enough to hold the front. Medium damage, high HP.</span>
          </button>
          <button type="button" class="card rogue" data-class="rogue">
            <span class="glyph">R</span>
            <span class="card-name">Rogue</span>
            <span class="card-desc">Dagger up close, bow at range — picked automatically. Hits hardest, takes hits badly.</span>
          </button>
          <button type="button" class="card mage" data-class="mage">
            <span class="glyph">M</span>
            <span class="card-name">Mage</span>
            <span class="card-desc">Area magic from the back line — hits groups at once. Fragile.</span>
          </button>
        </div>

        <div class="label">Species — your style</div>
        <div class="cards species">
          <button type="button" class="card selected" data-species="human">
            <span class="glyph">H</span>
            <span class="card-name">Human</span>
            <span class="card-desc">Learns faster: bonus XP on every award.</span>
          </button>
          <button type="button" class="card" data-species="elf">
            <span class="glyph">E</span>
            <span class="card-name">Elf</span>
            <span class="card-desc">Deadly precision: chance to land critical hits.</span>
          </button>
          <button type="button" class="card" data-species="dwarf">
            <span class="glyph">D</span>
            <span class="card-name">Dwarf</span>
            <span class="card-desc">Stone-tough: shrugs off part of every hit.</span>
          </button>
        </div>

        <button id="start-enter" type="button">Enter the world</button>
        <div class="hint">returning players skip this screen — your character remembers you</div>
      </div>
    </div>
    <div id="chat-root"></div>
    <div id="roster-root"></div>
    <div id="left-panels">
      <div id="quest-root"></div>
      <div id="gear-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
