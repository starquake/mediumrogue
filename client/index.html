<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medium Rogue</title>
    <style>
      :root {
        color-scheme: dark;
        --fg: #c8e6c9;
        --dim: #5a7a5c;
        --bg: #0b0f0b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: "Courier New", monospace;
        display: grid;
        place-items: center;
      }
      #hud {
        text-align: center;
      }
      #hud h1 {
        font-weight: normal;
        letter-spacing: 0.3em;
        color: var(--dim);
        font-size: 1rem;
        text-transform: uppercase;
      }
      #turn {
        font-size: 4rem;
      }
      #status {
        margin-top: 1rem;
        color: var(--dim);
      }
      #status[data-connected="true"]::before {
        content: "● ";
        color: #7cb342;
      }
      #status[data-connected="false"]::before {
        content: "○ ";
      }
    </style>
  </head>
  <body>
    <main id="hud">
      <h1>Medium Rogue</h1>
      <div id="turn" aria-label="world turn">—</div>
      <div id="status" data-connected="false">connecting…</div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
