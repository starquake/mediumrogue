<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medium Rogue</title>
    <style>
      :root {
        color-scheme: dark;
        --fg: #c8e6c9;
        --dim: #5a7a5c;
        --bg: #0b0f0b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: "Courier New", monospace;
      }
      canvas {
        display: block;
      }
      /* HUD floats over the canvas: the HTML-over-WebGL split is the plan's
         §6 design — social/status UI stays DOM, the world stays canvas. */
      #hud {
        position: fixed;
        top: 0.75rem;
        left: 1rem;
        z-index: 10;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #hud h1 {
        margin: 0 0 0.25rem;
        font-weight: normal;
        letter-spacing: 0.3em;
        color: var(--dim);
        font-size: 0.85rem;
        text-transform: uppercase;
      }
      #turn-row {
        font-size: 1.1rem;
      }
      #status {
        margin-top: 0.25rem;
        color: var(--dim);
        font-size: 0.85rem;
      }
      #status[data-connected="true"]::before {
        content: "● ";
        color: #7cb342;
      }
      #status[data-connected="false"]::before {
        content: "○ ";
      }
      #turn-timer {
        margin-top: 0.4rem;
        width: 8rem;
        height: 0.4rem;
        background: #1a241a;
        border: 1px solid var(--dim);
      }
      #turn-timer-fill {
        height: 100%;
        width: 0%;
        background: #7cb342;
      }
      #turn-timer[data-phase="playback"] #turn-timer-fill {
        background: var(--dim);
      }
    </style>
  </head>
  <body>
    <header id="hud">
      <h1>Medium Rogue</h1>
      <div id="turn-row">turn <span id="turn">—</span></div>
      <div id="status" data-connected="false">connecting…</div>
      <div id="turn-timer" data-phase="input"><div id="turn-timer-fill"></div></div>
    </header>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
