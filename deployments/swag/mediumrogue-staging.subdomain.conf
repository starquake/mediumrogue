## mediumrogue — staging. Proxies mediumrogue-staging.<domain> to the
## mediumrogue-staging container. Requires a CNAME for `mediumrogue-staging`.
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name mediumrogue-staging.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app mediumrogue-staging;
        set $upstream_port 8080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    location /api/events {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app mediumrogue-staging;
        set $upstream_port 8080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
        # SWAG's proxy.conf (included above) already sets 240s proxy_*_timeout
        # and the Connection header; the server's 15s SSE heartbeat keeps the
        # stream well under that. Buffering is the only thing proxy.conf leaves
        # ON, and it MUST be off for SSE or nginx holds turn-bundles in its
        # response buffer. Re-setting the timeouts here duplicates proxy.conf's
        # directives and makes nginx refuse to load (emerg: duplicate).
        proxy_buffering off;
    }
}
