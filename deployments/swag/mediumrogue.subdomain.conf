## mediumrogue — production. Proxies mediumrogue.<domain> to the
## mediumrogue-production container on SWAG's shared `web` network.
## Place in SWAG's proxy-confs/ dir; requires a CNAME for `mediumrogue`.
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name mediumrogue.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app mediumrogue-production;
        set $upstream_port 8080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # SSE turn-bundle stream. Buffering MUST be off or nginx holds bundles
    # in its response buffer and the client stalls; the long read timeout
    # keeps the idle-heartbeat stream from being reaped mid-turn.
    location /api/events {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app mediumrogue-production;
        set $upstream_port 8080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
        # SWAG's proxy.conf (included above) already sets 240s proxy_*_timeout
        # and the Connection header; the server's 15s SSE heartbeat keeps the
        # stream well under that. Buffering is the only thing proxy.conf leaves
        # ON, and it MUST be off for SSE or nginx holds turn-bundles in its
        # response buffer. Re-setting the timeouts here duplicates proxy.conf's
        # directives and makes nginx refuse to load (emerg: duplicate).
        proxy_buffering off;

        # #200: the SSE token rides the URL query string, and nginx's default
        # access log records it (via $request). This is the ONLY endpoint with
        # a secret in the URL — POST endpoints carry the token in the body — so
        # drop access logging just here. (A custom log_format that masked the
        # query would be cleaner but is only valid at http{} level, not in a
        # SWAG per-site server block.) The proper fix is to get the token out
        # of the URL entirely — tracked on #200 as a follow-up.
        access_log off;
    }
}
